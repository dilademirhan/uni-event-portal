<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Arel Portal | Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .auth-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gradient-to-tr from-purple-900 via-indigo-800 to-blue-600 min-h-screen flex items-center justify-center p-4">

    <div class="auth-card w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border border-white/20">
        <div class="flex p-2 bg-gray-100/50 m-4 rounded-2xl">
            <button onclick="switchTab('login')" id="login-btn" class="w-1/2 py-2.5 text-sm font-bold rounded-xl transition-all duration-300 bg-white shadow-sm text-indigo-700">Sign In</button>
            <button onclick="switchTab('register')" id="register-btn" class="w-1/2 py-2.5 text-sm font-bold rounded-xl transition-all duration-300 text-gray-500 hover:text-indigo-600">Register</button>
        </div>

        <div class="p-8 pt-4">
            <div id="error-box" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-xl">
                <p id="error-message" class="text-sm text-red-700 font-semibold"></p>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
                <input type="email" id="login-email" required class="w-full p-4 border rounded-2xl outline-none focus:ring-4 focus:ring-indigo-500/10 transition" placeholder="Email">
                <input type="password" id="login-password" required class="w-full p-4 border rounded-2xl outline-none focus:ring-4 focus:ring-indigo-500/10 transition" placeholder="Password">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-[0.98]">Sign In</button>
            </form>

            <form id="register-form" onsubmit="handleRegister(event)" class="hidden space-y-4">
                <input type="text" id="reg-name" required class="w-full p-3.5 border rounded-xl outline-none focus:border-indigo-500 transition" placeholder="Full Name">
                <input type="email" id="reg-email" required class="w-full p-3.5 border rounded-xl outline-none focus:border-indigo-500 transition" placeholder="Arel Email">
                <input type="password" id="reg-password" required class="w-full p-3.5 border rounded-xl outline-none focus:border-indigo-500 transition" placeholder="Password">
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">Create Account</button>
            </form>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
